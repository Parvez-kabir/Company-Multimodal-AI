<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Betopia AI | Intelligence Redefined</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="bg-animation"></div>

<div class="main-wrapper">
    <div id="chat-container">
        <div id="header">
            <div class="header-left">
                <div class="logo-circle">B</div>
                <div class="header-info">
                    <span class="brand-name">Betopia AI</span>
                    <span class="status"><span class="pulse"></span> Online</span>
                </div>
            </div>
            <div class="header-right">
                <i class="fas fa-ellipsis-h"></i>
            </div>
        </div>
        
        <div id="chat-box">
            <div class="message bot animate-in">
                <div class="avatar">AI</div>
                <div class="msg-content">
                    Hello! I am your Betopia intelligence assistant. How can I help you navigate our digital ecosystem today?
                </div>
            </div>
        </div>

        <div id="input-area">
            <div class="input-container">
                <input type="text" id="user-input" placeholder="Ask anything about Betopia..." autocomplete="off">
                <button id="send-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';

        // Add Loading Indicator
        const loadingId = 'loading-' + Date.now();
        const loadingDiv = document.createElement('div');
        loadingDiv.id = loadingId;
        loadingDiv.className = 'message bot animate-in';
        loadingDiv.innerHTML = `<div class="avatar">AI</div><div class="msg-content typing-dots"><span></span><span></span><span></span></div>`;
        chatBox.appendChild(loadingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await response.json();
            
            document.getElementById(loadingId).remove();
            appendMessage(data.reply, 'bot');
        } catch (error) {
            document.getElementById(loadingId).remove();
            appendMessage("Technical glitch encountered. Please try again.", 'bot');
        }
    }

    function appendMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender} animate-in`;
        const avatar = sender === 'bot' ? '<div class="avatar">AI</div>' : '';
        msgDiv.innerHTML = `${avatar}<div class="msg-content">${text}</div>`;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
</script>

</body>
</html>
